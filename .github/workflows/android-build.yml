name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clone the repository code into the runner
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Java Development Kit (JDK 17) required for modern Android builds
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    # 3. Setup and configure Gradle build environment automatically
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 4. Compile the project and generate the debug APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 5. Upload the generated APK file so you can download it directly to your phone
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Expressive-Todo-App
        path: app/build/outputs/apk/debug/app-debug.apk
