name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clone the repository code into the runner environment
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Java Development Kit (JDK 17) required for modern Android builds
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    # 3. Generate missing Gradle Wrapper files directly on the server
    - name: Generate Gradle Wrapper
      run: gradle wrapper

    # 4. Setup and configure the Gradle build environment
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 5. Grant executable permission to the generated gradlew file
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 6. Compile the project and build the debug APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 7. Upload the generated APK artifact so you can download it to your mobile
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Expressive-Todo-App
        path: app/build/outputs/apk/debug/app-debug.apk
